<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lantech Pre-Sales Labour Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&family=Barlow+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #0075BF;
    --brand-dark: #005a94;
    --brand-light: #e8f4fc;
    --brand-mid: #cce6f7;
    --bg: #f4f7fb;
    --surface: #ffffff;
    --surface2: #f0f5fa;
    --border: #dde6ef;
    --border-strong: #c2d4e3;
    --text: #1a2b3c;
    --text-muted: #6b7f92;
    --text-dim: #8fa3b5;
    --accent-green: #00a86b;
    --accent-orange: #f07c00;
    --user-bg: #0075BF;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,117,191,0.08);
    --shadow-lg: 0 8px 32px rgba(0,117,191,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex;
    align-items: center;
    height: 60px;
    flex-shrink: 0;
    box-shadow: 0 1px 8px rgba(0,117,191,0.06);
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 3px;
    background: var(--brand);
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo-mark img {
    height: 40px;
    width: auto;
    display: block;
  }

  .header-divider {
    width: 1px;
    height: 28px;
    background: var(--border);
    margin: 0 20px;
  }

  .header-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--brand);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .header-badge {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--brand-light);
    border: 1px solid var(--brand-mid);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    font-weight: 600;
    color: var(--brand);
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent-green);
    animation: pulse 2.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── Layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 230px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 14px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow-y: auto;
  }
  .sidebar-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 8px;
    padding-left: 8px;
  }

  .project-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 9px 12px;
    cursor: pointer;
    text-align: left;
    color: var(--text-muted);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 9px;
    width: 100%;
  }
  .project-btn:hover {
    background: var(--brand-light);
    color: var(--brand);
    border-color: var(--brand-mid);
  }
  .project-btn.active {
    background: var(--brand);
    color: white;
    border-color: var(--brand);
    box-shadow: 0 2px 8px rgba(0,117,191,0.25);
  }
  .project-btn .p-icon { font-size: 15px; flex-shrink: 0; }
  .project-btn .p-name { flex: 1; }
  .project-btn .p-check {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent-green);
    color: white;
    font-size: 10px;
    display: none;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .project-btn.done .p-check { display: flex; }
  .project-btn.active .p-check { background: rgba(255,255,255,0.3); }

  .sidebar-divider {
    height: 1px;
    background: var(--border);
    margin: 12px 0;
  }

  .summary-box {
    background: var(--brand);
    border-radius: 10px;
    padding: 14px;
    margin-top: auto;
    color: white;
  }
  .summary-box h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 10px;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    margin-bottom: 4px;
    opacity: 0.85;
  }
  .summary-row.total {
    border-top: 1px solid rgba(255,255,255,0.2);
    padding-top: 8px;
    margin-top: 6px;
    font-size: 13px;
    font-weight: 700;
    opacity: 1;
  }
  .summary-val { font-weight: 600; }

  /* ── Chat area ── */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 11px;
    animation: fadeUp 0.25s ease;
    max-width: 800px;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.user { flex-direction: row-reverse; align-self: flex-end; }
  .msg.bot { align-self: flex-start; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    font-weight: 700;
  }
  .avatar.bot-av {
    background: var(--brand);
    color: white;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    letter-spacing: 0.5px;
  }
  .avatar.user-av {
    background: var(--brand-light);
    border: 1px solid var(--brand-mid);
    color: var(--brand);
  }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    max-width: 620px;
  }
  .msg.bot .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px var(--radius) var(--radius) var(--radius);
    color: var(--text);
    box-shadow: var(--shadow);
  }
  .msg.user .bubble {
    background: var(--brand);
    border: 1px solid var(--brand-dark);
    border-radius: var(--radius) 4px var(--radius) var(--radius);
    color: white;
  }

  .bubble strong { color: var(--brand); font-weight: 600; }
  .msg.user .bubble strong { color: rgba(255,255,255,0.9); }

  .bubble .tag {
    display: inline-block;
    background: var(--brand-light);
    border: 1px solid var(--brand-mid);
    color: var(--brand);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 4px;
    margin: 2px 2px;
    letter-spacing: 0.3px;
  }

  .result-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-top: 12px;
    border-left: 3px solid var(--brand);
  }
  .rc-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 5px;
    color: var(--text-muted);
    gap: 16px;
  }
  .rc-row .rc-label { flex: 1; }
  .rc-row .rc-val { color: var(--text); font-weight: 600; white-space: nowrap; }
  .rc-row.big {
    font-size: 15px;
    color: var(--text);
    font-weight: 700;
    border-top: 1px solid var(--border);
    padding-top: 10px;
    margin-top: 8px;
  }
  .rc-row.big .rc-val { color: var(--brand); font-size: 16px; }

  /* Quick replies */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }
  .qr-btn {
    background: var(--surface);
    border: 1.5px solid var(--brand-mid);
    border-radius: 6px;
    padding: 7px 16px;
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--brand);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.2px;
  }
  .qr-btn:hover {
    background: var(--brand);
    border-color: var(--brand);
    color: white;
    box-shadow: 0 2px 8px rgba(0,117,191,0.2);
  }

  /* Input area */
  .input-area {
    padding: 14px 32px 18px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-shrink: 0;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.04);
  }
  .input-wrap {
    flex: 1;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    padding: 10px 14px;
    gap: 8px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-wrap:focus-within {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px rgba(0,117,191,0.08);
  }
  #userInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
  }
  #userInput::placeholder { color: var(--text-dim); }

  .send-btn {
    background: var(--brand);
    border: none;
    border-radius: 8px;
    width: 42px; height: 42px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s, box-shadow 0.15s;
    color: white;
    font-size: 17px;
    box-shadow: 0 2px 8px rgba(0,117,191,0.25);
  }
  .send-btn:hover {
    background: var(--brand-dark);
    box-shadow: 0 4px 12px rgba(0,117,191,0.35);
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex; gap: 4px; align-items: center; padding: 4px 0;
  }
  .typing-indicator span {
    width: 7px; height: 7px;
    background: var(--brand-mid);
    border-radius: 50%;
    animation: typing 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* Progress bar */
  .progress-bar-wrap {
    background: var(--border);
    border-radius: 4px;
    height: 4px;
    margin-top: 10px;
    overflow: hidden;
  }
  .progress-bar-fill {
    background: var(--brand);
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
  }
</style>
</head>

      <span class="p-icon">☁️</span>
      <span class="p-name">Cloud Migration</span>
      <span class="p-check">✓</span>
    </button>
    <button class="project-btn" id="btn-server" onclick="startProject('server')">
      <span class="p-icon">🖥️</span>
      <span class="p-name">Server Upgrade</span>
      <span class="p-check">✓</span>
    </button>

      let r = [];
      if ((parseFloat(a.licenses)||0)>0) r.push([`Apply Licences (×${a.licenses})`, round((parseFloat(a.licenses)||0)*0.1)]);
      if (a.dc_build==='yes') r.push(['Domain Controller Build', 3.75]);
      if ((parseFloat(a.azure_files)||0)>0) r.push([`Azure Files (×${a.azure_files})`, round((parseFloat(a.azure_files)||0)*3.75)]);
      if ((parseFloat(a.pool_servers)||0)>0) r.push([`Pool Servers (×${a.pool_servers})`, round((parseFloat(a.pool_servers)||0)*2)]);
      if ((parseFloat(a.app_servers)||0)>0) r.push([`Application Servers (×${a.app_servers})`, round((parseFloat(a.app_servers)||0)*2)]);
      if ((parseFloat(a.vendor_apps)||0)>0) r.push([`Vendor App Management (×${a.vendor_apps})`, round((parseFloat(a.vendor_apps)||0)*2)]);
      if ((parseFloat(a.end_user_devices)||0)>0) r.push([`End User Device Config (×${a.end_user_devices})`, round((parseFloat(a.end_user_devices)||0)*0.25)]);
      r.push(['Documentation', 1]);
      return r;
    }
  },
  recycle: {
    name: 'Recycling', icon: '♻️',
    steps: [
      { key: 'servers',       q: 'How many <strong>servers</strong> need to be recycled?', type: 'number', hint: 'e.g. 0' },
      { key: 'pcs',           q: 'How many <strong>PCs / Laptops</strong> need to be recycled?', type: 'number', hint: 'e.g. 0' },
      { key: 'storage',       q: 'How many <strong>storage devices</strong> need to be recycled?', type: 'number', hint: 'e.g. 0' },
      { key: 'network_eq',    q: 'How many <strong>network equipment items</strong> need to be recycled? (Firewalls, Switches, APs)', type: 'number', hint: 'e.g. 0' },
      { key: 'ups',           q: 'How many <strong>UPS units</strong> (including batteries) need to be recycled?', type: 'number', hint: 'e.g. 0' },
      { key: 'ups_batteries', q: 'How many <strong>UPS batteries</strong> need to be removed separately?', type: 'number', hint: 'e.g. 0' },
      { key: 'cert_disks',    q: 'How many <strong>disks</strong> require <strong>certified destruction</strong>?', type: 'number', hint: 'e.g. 0' },
      { key: 'uncert_disks',  q: 'How many <strong>disks</strong> require <strong>uncertified destruction</strong>?', type: 'number', hint: 'e.g. 0' },
      { key: 'pm_fee',        q: 'Should a <strong>Project Management fee</strong> (20%) be included?', type: 'yesno' },
    ],
    calc: (a) => {
      let h = (parseFloat(a.servers)||0)*0.2 + (parseFloat(a.pcs)||0)*0.1 + (parseFloat(a.storage)||0)*0.2 + (parseFloat(a.network_eq)||0)*0.2 + (parseFloat(a.ups)||0)*0.25 + (parseFloat(a.ups_batteries)||0)*0.2 + (parseFloat(a.cert_disks)||0)*0.1 + (parseFloat(a.uncert_disks)||0)*0.1;
      let c = h*RATE; if (a.pm_fee==='yes') c *= 1.2;
      return { hrs: round(h), cost: round(c), pm: a.pm_fee==='yes' };
    },
    breakdown: (a) => {
      let r = [];
      if ((parseFloat(a.servers)||0)>0) r.push([`Recycle Servers (×${a.servers})`, round((parseFloat(a.servers)||0)*0.2)]);
      if ((parseFloat(a.pcs)||0)>0) r.push([`Recycle PCs/Laptops (×${a.pcs})`, round((parseFloat(a.pcs)||0)*0.1)]);
      if ((parseFloat(a.storage)||0)>0) r.push([`Recycle Storage Devices (×${a.storage})`, round((parseFloat(a.storage)||0)*0.2)]);
      if ((parseFloat(a.network_eq)||0)>0) r.push([`Recycle Network Equipment (×${a.network_eq})`, round((parseFloat(a.network_eq)||0)*0.2)]);
      if ((parseFloat(a.ups)||0)>0) r.push([`Recycle UPS (×${a.ups})`, round((parseFloat(a.ups)||0)*0.25)]);
      if ((parseFloat(a.ups_batteries)||0)>0) r.push([`Recycle UPS Batteries (×${a.ups_batteries})`, round((parseFloat(a.ups_batteries)||0)*0.2)]);
      if ((parseFloat(a.cert_disks)||0)>0) r.push([`Certified Disk Destruction (×${a.cert_disks})`, round((parseFloat(a.cert_disks)||0)*0.1)]);
      if ((parseFloat(a.uncert_disks)||0)>0) r.push([`Uncertified Disk Destruction (×${a.uncert_disks})`, round((parseFloat(a.uncert_disks)||0)*0.1)]);
      return r;
    }
  }
};

// ── Helpers ──────────────────────────────────────────────────────────────────
function round(n) { return Math.round(n*100)/100; }
function fmt(n) { return n.toLocaleString('en-IE', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtHrs(n) { return n%1===0 ? n.toString() : n.toFixed(2); }
function scrollBottom() { const m=document.getElementById('messages'); setTimeout(()=>m.scrollTop=m.scrollHeight,50); }
function delay(ms) { return new Promise(r=>setTimeout(r,ms)); }

function addMsg(html, role='bot') {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = `avatar ${role==='bot'?'bot-av':'user-av'}`;
  av.textContent = role==='bot' ? 'LT' : '👤';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html;
  if (role==='bot') { div.appendChild(av); div.appendChild(bubble); }
  else { div.appendChild(av); div.appendChild(bubble); }
  msgs.appendChild(div);
  scrollBottom();
  return bubble;
}

function addTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing';
  div.innerHTML = `<div class="avatar bot-av">LT</div><div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(div); scrollBottom();
}
function removeTyping() { const t=document.getElementById('typing'); if(t) t.remove(); }

async function botSay(html, ms=500) {
  addTyping(); await delay(ms); removeTyping(); addMsg(html,'bot');
}

function showQR(options) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'quick-replies'; div.id = 'qr-bar';
  options.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn'; btn.textContent = o;
    btn.onclick = () => { clearQR(); processAnswer(o); };
    div.appendChild(btn);
  });
  msgs.appendChild(div); scrollBottom();
}
function clearQR() { const q=document.getElementById('qr-bar'); if(q) q.remove(); }

function updateSidebar() {
  const rows = document.getElementById('summaryRows');
  const total = document.getElementById('summaryTotal');
  rows.innerHTML = '';
  let tH=0, tC=0;
  Object.entries(state.sessionResults).forEach(([k,r]) => {
    const p = PROJECTS[k];
    const row = document.createElement('div');
    row.className = 'summary-row';
    row.innerHTML = `<span>${p.icon} ${p.name.split(' ')[0]}</span><span class="summary-val">${fmtHrs(r.hrs)} hrs</span>`;
    rows.appendChild(row);
    tH += r.hrs; tC += r.cost;
  });
  total.textContent = `${fmtHrs(round(tH))} hrs / €${fmt(tC)}`;
}

function markDone(key) {
  const btn = document.getElementById(`btn-${key}`);
  if (btn) btn.classList.add('done');
}

function startProject(key) {
  document.querySelectorAll('.project-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`btn-${key}`).classList.add('active');
  state.project = key; state.step = 0; state.answers = {};
  const p = PROJECTS[key];
  addMsg(`<strong>${p.icon} ${p.name}</strong>`, 'user');
  botSay(`Let's scope a <strong>${p.name}</strong> project. I'll ask you ${p.steps.length} quick questions to calculate the required labour hours.<br><br>Answer with a number, or use the <strong>Yes / No</strong> buttons where shown.`, 350).then(askStep);
}

function askStep() {
  const p = PROJECTS[state.project];
  if (state.step >= p.steps.length) { showResult(); return; }
  const s = p.steps[state.step];
  const pct = Math.round((state.step/p.steps.length)*100);
  let extra = s.hint ? `<br><span style="color:var(--text-dim);font-size:12px">e.g. ${s.hint}</span>` : '';
  const progress = `<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>`;
  botSay(`<span style="color:var(--text-muted);font-size:12px;font-weight:600;">Question ${state.step+1} of ${p.steps.length}</span><br>${s.q}${extra}${progress}`, 380).then(()=>{
    if (s.type==='yesno') showQR(['Yes','No']);
  });
}

function processAnswer(raw) {
  clearQR();
  const p = PROJECTS[state.project];
  const s = p.steps[state.step];
  let val = raw.trim();
  if (s.type==='yesno') {
    val = (val.toLowerCase()==='yes'||val==='Yes') ? 'yes' : 'no';
  } else {
    const num = parseFloat(val);
    if (isNaN(num)||num<0) {
      addMsg(val,'user');
      botSay(`Please enter a valid number (0 or higher).`);
      if (s.type==='yesno') showQR(['Yes','No']);
      return;
    }
    val = num;
  }
  addMsg(s.type==='yesno' ? (val==='yes'?'✅  Yes':'❌  No') : val.toString(), 'user');
  state.answers[s.key] = val;
  state.step++;
  setTimeout(askStep, 280);
}

function showResult() {
  const p = PROJECTS[state.project];
  const result = p.calc(state.answers);
  const bd = p.breakdown(state.answers);
  state.sessionResults[state.project] = result;
  markDone(state.project);
  updateSidebar();

  const bdRows = bd.map(([label,hrs])=>
    `<div class="rc-row"><span class="rc-label">${label}</span><span class="rc-val">${fmtHrs(hrs)} hrs</span></div>`
  ).join('');
  const pmNote = result.pm ? `<div class="rc-row"><span class="rc-label">Project Management Fee (20%)</span><span class="rc-val">included</span></div>` : '';

  botSay(`
    <strong>✅ ${p.name} — Estimate Complete</strong>
    <div class="result-card">
      ${bdRows}
      ${pmNote}
      <div class="rc-row big"><span class="rc-label">Total Labour Hours</span><span class="rc-val">${fmtHrs(result.hrs)} hrs</span></div>
      <div class="rc-row big"><span class="rc-label">Total Cost <span style="font-weight:400;font-size:12px">(@ €${RATE}/hr)</span></span><span class="rc-val">€${fmt(result.cost)}</span></div>
    </div>
  `, 500).then(()=>{
    botSay(`Would you like to scope another project, or view the full session summary?`, 500).then(()=>{
      showQR(['Scope another project','View full summary']);
      document.querySelectorAll('.project-btn').forEach(b=>b.classList.remove('active'));
    });
  });
}

function handleUserInput() {
  const input = document.getElementById('userInput');
  const val = input.value.trim();
  if (!val) return;
  input.value = '';
  if (!state.project || state.step>=(PROJECTS[state.project]?.steps.length||0)) {
    clearQR();
    const lower = val.toLowerCase();
    if (lower.includes('another')||lower.includes('scope')||lower.includes('new')) {
      addMsg(val,'user');
      botSay('Select a project from the left panel to begin.', 300);
    } else if (lower.includes('summary')||lower.includes('done')||lower.includes('full')) {
      addMsg(val,'user'); showFullSummary();
    } else {
      addMsg(val,'user');
      botSay('Select a project from the left panel to begin, or type <strong>summary</strong> to see all results.', 300);
    }
    return;
  }
  clearQR(); processAnswer(val);
}

function showFullSummary() {
  const keys = Object.keys(state.sessionResults);
  if (!keys.length) { botSay('No projects scoped yet. Select a project from the left panel to get started.'); return; }
  const rows = keys.map(k=>{
    const p=PROJECTS[k]; const r=state.sessionResults[k];
    return `<div class="rc-row"><span class="rc-label">${p.icon} ${p.name}</span><span class="rc-val">${fmtHrs(r.hrs)} hrs — €${fmt(r.cost)}</span></div>`;
  }).join('');
  const tH = round(keys.reduce((s,k)=>s+state.sessionResults[k].hrs,0));
  const tC = keys.reduce((s,k)=>s+state.sessionResults[k].cost,0);
  botSay(`
    <strong>📋 Full Pre-Sales Summary</strong>
    <div class="result-card">
      ${rows}
      <div class="rc-row big"><span class="rc-label">Grand Total</span><span class="rc-val">${fmtHrs(tH)} hrs — €${fmt(tC)}</span></div>
    </div>
    <span style="color:var(--text-muted);font-size:11px">Rate: €${RATE}/hr · PM fee applied per project where selected</span>
  `, 500);
}

document.getElementById('userInput').addEventListener('keydown', e=>{
  if (e.key==='Enter') { e.preventDefault(); handleUserInput(); }
});

(async()=>{
  await delay(200);
  await botSay(`👋 Welcome to the <strong>Lantech Pre-Sales Labour Calculator</strong>.<br><br>Select a project type from the left panel to begin scoping. I'll guide you through the relevant questions and calculate the labour hours and cost automatically.<br><br>
    <span class="tag">☁️ Cloud Migration</span>
    <span class="tag">🖥️ Server Upgrade</span>
    <span class="tag">🌐 Network Upgrade</span>
    <span class="tag">📧 SMTP Secure Send</span>
    <span class="tag">📱 MDM / MAM</span>
    <span class="tag">🖱️ AVD</span>
    <span class="tag">♻️ Recycling</span>
  `, 150);
})();
</script>
</body>
</html>
