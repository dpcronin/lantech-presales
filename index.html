<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lantech Pre-Sales Labour Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --warn: #f59e0b;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --user-bubble: #1e3a5f;
    --bot-bubble: #111827;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
  }
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .header-text h1 {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: var(--text);
  }
  .header-text p {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 1px;
  }
  .header-status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--accent3);
    letter-spacing: 0.5px;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent3);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Main layout */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 14px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .sidebar-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
    padding-left: 4px;
  }
  .project-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 9px 12px;
    cursor: pointer;
    text-align: left;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .project-btn:hover {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--border);
  }
  .project-btn.active {
    background: rgba(0,212,255,0.08);
    border-color: rgba(0,212,255,0.3);
    color: var(--accent);
  }
  .project-btn .p-icon { font-size: 14px; }
  .project-btn .p-name { flex: 1; }
  .project-btn .p-badge {
    background: var(--accent2);
    color: white;
    font-size: 8px;
    padding: 1px 5px;
    border-radius: 10px;
    display: none;
  }
  .project-btn.done .p-badge { display: block; }

  .sidebar-divider {
    height: 1px;
    background: var(--border);
    margin: 10px 0;
  }

  .summary-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    margin-top: auto;
  }
  .summary-box h3 {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .summary-row.total {
    border-top: 1px solid var(--border);
    padding-top: 8px;
    margin-top: 6px;
    color: var(--accent);
    font-size: 12px;
    font-weight: 500;
  }
  .summary-val { color: var(--text); }

  /* Chat area */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 28px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.3s ease;
    max-width: 780px;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.user { flex-direction: row-reverse; align-self: flex-end; }
  .msg.bot { align-self: flex-start; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .avatar.bot-av { background: linear-gradient(135deg, #00d4ff22, #7c3aed22); border: 1px solid var(--border); }
  .avatar.user-av { background: var(--user-bubble); border: 1px solid #1e3a5f; }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    line-height: 1.65;
    max-width: 620px;
  }
  .msg.bot .bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-radius: 4px var(--radius) var(--radius) var(--radius);
    color: var(--text);
  }
  .msg.user .bubble {
    background: var(--user-bubble);
    border: 1px solid #1e3a5f;
    border-radius: var(--radius) 4px var(--radius) var(--radius);
    color: var(--text);
  }

  .bubble strong { color: var(--accent); font-weight: 500; }
  .bubble .tag {
    display: inline-block;
    background: rgba(124,58,237,0.15);
    border: 1px solid rgba(124,58,237,0.3);
    color: #a78bfa;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    margin: 2px;
    letter-spacing: 0.5px;
  }
  .bubble .result-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-top: 10px;
  }
  .result-card .rc-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    margin-bottom: 5px;
    color: var(--text-dim);
  }
  .result-card .rc-row.big {
    font-size: 14px;
    color: var(--text);
    border-top: 1px solid var(--border);
    padding-top: 8px;
    margin-top: 6px;
  }
  .result-card .rc-val { color: var(--accent3); }
  .result-card .rc-row.big .rc-val { color: var(--accent); font-weight: 500; }

  /* Options / quick replies */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }
  .qr-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .qr-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,255,0.05);
  }

  /* Input area */
  .input-area {
    padding: 16px 28px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  .input-wrap {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    padding: 10px 14px;
    gap: 8px;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within { border-color: rgba(0,212,255,0.4); }
  #userInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    resize: none;
    height: 22px;
    line-height: 22px;
  }
  #userInput::placeholder { color: var(--text-muted); }
  .send-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 8px;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.15s;
    font-size: 16px;
  }
  .send-btn:hover { opacity: 0.85; }

  .typing-indicator {
    display: flex; gap: 4px; align-items: center; padding: 4px 0;
  }
  .typing-indicator span {
    width: 6px; height: 6px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: typing 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-icon">⚡</div>
  <div class="header-text">
    <h1>Lantech Pre-Sales Agent</h1>
    <p>Labour Estimation · Project Scoping</p>
  </div>
  <div class="header-status">
    <div class="status-dot"></div>
    ONLINE
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-label">Project Types</div>
    <button class="project-btn" id="btn-cloud" onclick="startProject('cloud')">
      <span class="p-icon">☁️</span>
      <span class="p-name">Cloud Migration</span>
      <span class="p-badge">✓</span>
    </button>
    <button class="project-btn" id="btn-server" onclick="startProject('server')">
      <span class="p-icon">🖥️</span>
      <span class="p-name">Server Upgrade</span>
      <span class="p-badge">✓</span>
    </button>
    <button class="project-btn" id="btn-network" onclick="startProject('network')">
      <span class="p-icon">🌐</span>
      <span class="p-name">Network Upgrade</span>
      <span class="p-badge">✓</span>
    </button>
    <button class="project-btn" id="btn-smtp" onclick="startProject('smtp')">
      <span class="p-icon">📧</span>
      <span class="p-name">SMTP Secure Send</span>
      <span class="p-badge">✓</span>
    </button>
    <button class="project-btn" id="btn-mdm" onclick="startProject('mdm')">
      <span class="p-icon">📱</span>
      <span class="p-name">MDM / MAM</span>
      <span class="p-badge">✓</span>
    </button>
    <button class="project-btn" id="btn-avd" onclick="startProject('avd')">
      <span class="p-icon">🖱️</span>
      <span class="p-name">AVD</span>
      <span class="p-badge">✓</span>
    </button>
    <button class="project-btn" id="btn-recycle" onclick="startProject('recycle')">
      <span class="p-icon">♻️</span>
      <span class="p-name">Recycling</span>
      <span class="p-badge">✓</span>
    </button>

    <div class="sidebar-divider"></div>

    <div class="summary-box">
      <h3>Session Summary</h3>
      <div id="summaryRows"></div>
      <div class="summary-row total">
        <span>TOTAL</span>
        <span class="summary-val" id="summaryTotal">0 hrs / €0</span>
      </div>
    </div>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-wrap">
        <input type="text" id="userInput" placeholder="Type a number, yes/no, or select an option above…" autocomplete="off"/>
      </div>
      <button class="send-btn" onclick="handleUserInput()">➤</button>
    </div>
  </div>
</div>

<script>
const RATE = 150;

// ─── State ────────────────────────────────────────────────────────────────────
let state = {
  project: null,
  step: 0,
  answers: {},
  sessionResults: {}
};

// ─── Project Definitions ─────────────────────────────────────────────────────

const PROJECTS = {

  cloud: {
    name: 'Cloud Migration',
    icon: '☁️',
    steps: [
      { key: 'data_gb',     q: 'How many <strong>GB of data</strong> need to be migrated to SharePoint / OneDrive?', type: 'number', hint: 'e.g. 500' },
      { key: 'workstations',q: 'How many <strong>workstations</strong> need to be migrated to Azure AD?', type: 'number', hint: 'e.g. 20' },
      { key: 'intune',      q: 'Is <strong>Intune Baseline Policy Configuration</strong> required?', type: 'yesno' },
      { key: 'teams',       q: 'How many <strong>MS Teams / Channels</strong> need to be created?', type: 'number', hint: 'e.g. 5' },
      { key: 'new_users',   q: 'How many <strong>new user accounts</strong> need to be created?', type: 'number', hint: 'e.g. 50' },
      { key: 'mailboxes',   q: 'How many <strong>mailboxes</strong> need to be migrated to Microsoft 365?', type: 'number', hint: 'e.g. 50' },
      { key: 'saas_backup', q: 'Is <strong>SaaS Backup</strong> setup required?', type: 'yesno' },
      { key: 'dhcp_dns',    q: 'Is <strong>DHCP and DNS setup on Firewall</strong> required?', type: 'yesno' },
      { key: 'disable_aad_connect', q: 'Does <strong>Azure AD Connect</strong> need to be disabled?', type: 'yesno' },
      { key: 'jumpbox',     q: 'Is a <strong>Jumpbox</strong> required (Build & Install)?', type: 'yesno' },
      { key: 'pm_fee',      q: 'Should a <strong>Project Management fee</strong> (20%) be included?', type: 'yesno' },
    ],
    calc: (a) => {
      let hrs = 0;
      hrs += (parseFloat(a.data_gb) || 0) * 0.01;
      hrs += (parseFloat(a.workstations) || 0) * 0.35;
      if (a.intune === 'yes') hrs += 3.75;
      hrs += (parseFloat(a.teams) || 0) * 0.25;
      hrs += (parseFloat(a.new_users) || 0) * 0.2;
      hrs += (parseFloat(a.mailboxes) || 0) * 0.35;
      if (a.saas_backup === 'yes') hrs += 1;
      if (a.dhcp_dns === 'yes') hrs += 1.5;
      if (a.disable_aad_connect === 'yes') hrs += 0.5;
      if (a.jumpbox === 'yes') hrs += 1;
      hrs += 1; // documentation
      let cost = hrs * RATE;
      if (a.pm_fee === 'yes') cost = cost * 1.20;
      return { hrs: round(hrs), cost: round(cost), pm: a.pm_fee === 'yes' };
    },
    breakdown: (a) => {
      let rows = [];
      if ((parseFloat(a.data_gb)||0) > 0) rows.push([`Data Migration (${a.data_gb} GB)`, round((parseFloat(a.data_gb)||0)*0.01)]);
      if ((parseFloat(a.workstations)||0) > 0) rows.push([`Workstation Azure AD Migration (${a.workstations})`, round((parseFloat(a.workstations)||0)*0.35)]);
      if (a.intune==='yes') rows.push(['Intune Baseline Policy Config', 3.75]);
      if ((parseFloat(a.teams)||0)>0) rows.push([`Teams / Channels (${a.teams})`, round((parseFloat(a.teams)||0)*0.25)]);
      if ((parseFloat(a.new_users)||0)>0) rows.push([`New User Accounts (${a.new_users})`, round((parseFloat(a.new_users)||0)*0.2)]);
      if ((parseFloat(a.mailboxes)||0)>0) rows.push([`Mailbox Migration (${a.mailboxes})`, round((parseFloat(a.mailboxes)||0)*0.35)]);
      if (a.saas_backup==='yes') rows.push(['SaaS Backup Setup', 1]);
      if (a.dhcp_dns==='yes') rows.push(['DHCP & DNS on Firewall', 1.5]);
      if (a.disable_aad_connect==='yes') rows.push(['Disable Azure AD Connect', 0.5]);
      if (a.jumpbox==='yes') rows.push(['Build & Install Jumpbox', 1]);
      rows.push(['Documentation', 1]);
      return rows;
    }
  },

  server: {
    name: 'Server Upgrade',
    icon: '🖥️',
    steps: [
      { key: 'physical_install', q: 'How many <strong>physical servers</strong> need to be installed?', type: 'number', hint: 'e.g. 1' },
      { key: 'raid_os',         q: 'How many servers need <strong>RAID / OS / IP setup</strong>?', type: 'number', hint: 'e.g. 1' },
      { key: 'hyperv',          q: 'How many servers need <strong>Hyper-V setup</strong> (vNICs, vSwitches)?', type: 'number', hint: 'e.g. 0' },
      { key: 'dc_promo',        q: 'How many <strong>Domain Controller promotions</strong> are needed?', type: 'number', hint: 'e.g. 0' },
      { key: 'dc_demotion',     q: 'How many <strong>Domain Controller demotions</strong> are needed?', type: 'number', hint: 'e.g. 0' },
      { key: 'vms',             q: 'How many <strong>Virtual Machines</strong> need to be built?', type: 'number', hint: 'e.g. 0' },
      { key: 'extra_cpu',       q: 'Is an <strong>Extra Processor</strong> being installed?', type: 'yesno' },
      { key: 'extra_ram',       q: 'Is <strong>Extra RAM or a Cooling Fan</strong> being installed?', type: 'yesno' },
      { key: 'ilo',             q: 'Is <strong>ILO setup</strong> required?', type: 'yesno' },
      { key: 'fsmo',            q: 'Does <strong>FSMO</strong> need to be moved?', type: 'yesno' },
      { key: 'psu2',            q: 'Is a <strong>2nd Power Supply</strong> being added?', type: 'yesno' },
      { key: 'dhcp_dns_roles',  q: 'Do <strong>DHCP / DNS Roles</strong> need to be moved?', type: 'yesno' },
      { key: 'data_migration_gb', q: 'How many <strong>GB of data</strong> need to be migrated server-to-server?', type: 'number', hint: 'e.g. 0' },
      { key: 'cals',            q: 'Are <strong>CALs</strong> required?', type: 'yesno' },
      { key: 'backups',         q: 'Does <strong>Backup</strong> configuration need to be added?', type: 'yesno' },
      { key: 'third_party',     q: 'Is <strong>3rd Party vendor</strong> involvement required?', type: 'yesno' },
      { key: 'pm_fee',          q: 'Should a <strong>Project Management fee</strong> (20%) be included?', type: 'yesno' },
    ],
    calc: (a) => {
      let hrs = 0;
      hrs += (parseFloat(a.physical_install)||0) * 1;
      hrs += (parseFloat(a.raid_os)||0) * 3;
      hrs += (parseFloat(a.hyperv)||0) * 1;
      hrs += (parseFloat(a.dc_promo)||0) * 2;
      hrs += (parseFloat(a.dc_demotion)||0) * 2;
      hrs += (parseFloat(a.vms)||0) * 1;
      if (a.extra_cpu==='yes') hrs += 0.5;
      if (a.extra_ram==='yes') hrs += 0.25;
      if (a.ilo==='yes') hrs += 0.5;
      if (a.fsmo==='yes') hrs += 0.5;
      if (a.psu2==='yes') hrs += 0.25;
      if (a.dhcp_dns_roles==='yes') hrs += 1;
      hrs += (parseFloat(a.data_migration_gb)||0) * 0.01;
      if (a.cals==='yes') hrs += 0.25;
      if (a.backups==='yes') hrs += 0.5;
      if (a.third_party==='yes') hrs += 1;
      hrs += 1; // documentation
      let cost = hrs * RATE;
      if (a.pm_fee==='yes') cost *= 1.20;
      return { hrs: round(hrs), cost: round(cost), pm: a.pm_fee==='yes' };
    },
    breakdown: (a) => {
      let rows = [];
      if ((parseFloat(a.physical_install)||0)>0) rows.push([`Physical Server Install (x${a.physical_install})`, round((parseFloat(a.physical_install)||0)*1)]);
      if ((parseFloat(a.raid_os)||0)>0) rows.push([`RAID/OS/IP Setup (x${a.raid_os})`, round((parseFloat(a.raid_os)||0)*3)]);
      if ((parseFloat(a.hyperv)||0)>0) rows.push([`Hyper-V Setup (x${a.hyperv})`, round((parseFloat(a.hyperv)||0)*1)]);
      if ((parseFloat(a.dc_promo)||0)>0) rows.push([`DC Promotion (x${a.dc_promo})`, round((parseFloat(a.dc_promo)||0)*2)]);
      if ((parseFloat(a.dc_demotion)||0)>0) rows.push([`DC Demotion (x${a.dc_demotion})`, round((parseFloat(a.dc_demotion)||0)*2)]);
      if ((parseFloat(a.vms)||0)>0) rows.push([`VM Build (x${a.vms})`, round((parseFloat(a.vms)||0)*1)]);
      if (a.extra_cpu==='yes') rows.push(['Extra Processor Install', 0.5]);
      if (a.extra_ram==='yes') rows.push(['Extra RAM / Cooling Fan', 0.25]);
      if (a.ilo==='yes') rows.push(['ILO Setup', 0.5]);
      if (a.fsmo==='yes') rows.push(['Move FSMO', 0.5]);
      if (a.psu2==='yes') rows.push(['2nd Power Supply', 0.25]);
      if (a.dhcp_dns_roles==='yes') rows.push(['Move DHCP/DNS Roles', 1]);
      if ((parseFloat(a.data_migration_gb)||0)>0) rows.push([`Data Migration (${a.data_migration_gb} GB)`, round((parseFloat(a.data_migration_gb)||0)*0.01)]);
      if (a.cals==='yes') rows.push(['Add CALs', 0.25]);
      if (a.backups==='yes') rows.push(['Backup Configuration', 0.5]);

// ─── Helpers ─────────────────────────────────────────────────────────────────
function round(n) { return Math.round(n * 100) / 100; }
function fmt(n) { return n.toLocaleString('en-IE', {minimumFractionDigits: 2, maximumFractionDigits: 2}); }
function fmtHrs(n) { return n % 1 === 0 ? n.toString() : n.toFixed(2); }

function scrollBottom() {
  const m = document.getElementById('messages');
  setTimeout(() => m.scrollTop = m.scrollHeight, 50);
}

function addMsg(html, role='bot') {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = `avatar ${role === 'bot' ? 'bot-av' : 'user-av'}`;
  av.textContent = role === 'bot' ? '⚡' : '👤';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html;
  if (role === 'bot') { div.appendChild(av); div.appendChild(bubble); }
  else { div.appendChild(av); div.appendChild(bubble); }
  msgs.appendChild(div);
  scrollBottom();
  return bubble;
}

function addTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = `<div class="avatar bot-av">⚡</div><div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(div);
  scrollBottom();
}
function removeTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

async function botSay(html, delayMs=600) {
  addTyping();
  await delay(delayMs);
  removeTyping();
  addMsg(html, 'bot');
}

// ─── Quick Replies ────────────────────────────────────────────────────────────
function showQR(options) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'quick-replies';
  div.id = 'qr-bar';
  options.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = o;
    btn.onclick = () => { clearQR(); processAnswer(o); };
    div.appendChild(btn);
  });
  msgs.appendChild(div);
  scrollBottom();
}

function clearQR() { const q = document.getElementById('qr-bar'); if(q) q.remove(); }

// ─── Session summary sidebar ──────────────────────────────────────────────────
function updateSidebar() {
  const rows = document.getElementById('summaryRows');
  const total = document.getElementById('summaryTotal');
  rows.innerHTML = '';
  let totalHrs = 0, totalCost = 0;
  Object.entries(state.sessionResults).forEach(([k, r]) => {
    const p = PROJECTS[k];
    const row = document.createElement('div');
    row.className = 'summary-row';
    row.innerHTML = `<span>${p.icon} ${p.name.split(' ')[0]}</span><span class="summary-val">${fmtHrs(r.hrs)} hrs</span>`;
    rows.appendChild(row);
    totalHrs += r.hrs;
    totalCost += r.cost;
  });
  total.textContent = `${fmtHrs(round(totalHrs))} hrs / €${fmt(totalCost)}`;
}

function markDone(key) {
  const btn = document.getElementById(`btn-${key}`);
  if (btn) btn.classList.add('done');
}

// ─── Flow Control ─────────────────────────────────────────────────────────────
function startProject(key) {
  // Highlight active button
  document.querySelectorAll('.project-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn-${key}`).classList.add('active');

  state.project = key;
  state.step = 0;
  state.answers = {};
  const p = PROJECTS[key];
  addMsg(`<strong>${p.icon} ${p.name}</strong>`, 'user');
  botSay(`Let's scope a <strong>${p.name}</strong> project. I'll ask you a few questions to calculate the required labour hours.<br><br>Answer with numbers or <span class="tag">yes</span> <span class="tag">no</span> for each item.`, 400).then(() => {
    askStep();
  });
}

function askStep() {
  const p = PROJECTS[state.project];
  if (state.step >= p.steps.length) {
    showResult();
    return;
  }
  const s = p.steps[state.step];
  let extra = '';
  if (s.hint) extra = `<br><span style="color:var(--text-muted);font-size:11px">e.g. ${s.hint}</span>`;
  botSay(`<strong>Q${state.step + 1}/${p.steps.length}</strong> — ${s.q}${extra}`, 400).then(() => {
    if (s.type === 'yesno') showQR(['Yes', 'No']);
  });
}

function processAnswer(raw) {
  clearQR();
  const p = PROJECTS[state.project];
  const s = p.steps[state.step];
  let val = raw.trim();

  // Normalise yes/no
  if (s.type === 'yesno') {
    val = val.toLowerCase() === 'yes' || val === 'Yes' ? 'yes' : 'no';
  } else {
    const num = parseFloat(val);
    if (isNaN(num) || num < 0) {
      addMsg(val, 'user');
      botSay(`⚠️ Please enter a valid number (0 or higher).`);
      if (s.type === 'yesno') showQR(['Yes', 'No']);
      return;
    }
    val = num;
  }

  addMsg(s.type === 'yesno' ? (val === 'yes' ? '✅ Yes' : '❌ No') : val.toString(), 'user');
  state.answers[s.key] = val;
  state.step++;
  setTimeout(askStep, 300);
}

function showResult() {
  const p = PROJECTS[state.project];
  const result = p.calc(state.answers);
  const breakdown = p.breakdown(state.answers);

  state.sessionResults[state.project] = result;
  markDone(state.project);
  updateSidebar();

  let bdRows = breakdown.map(([label, hrs]) =>
    `<div class="rc-row"><span>${label}</span><span class="rc-val">${fmtHrs(hrs)} hrs</span></div>`
  ).join('');

  const pmNote = result.pm ? `<div class="rc-row"><span>Project Management (20%)</span><span class="rc-val">included</span></div>` : '';

  botSay(`
    ✅ <strong>${p.name} — Labour Estimate Complete</strong>
    <div class="result-card">
      ${bdRows}
      ${pmNote}
      <div class="rc-row big"><span>Total Hours</span><span class="rc-val">${fmtHrs(result.hrs)} hrs</span></div>
      <div class="rc-row big"><span>Total Cost (@ €${RATE}/hr)</span><span class="rc-val">€${fmt(result.cost)}</span></div>
    </div>
  `, 500).then(() => {
    botSay(`Would you like to scope another project, or are you done?`, 600).then(() => {
      showQR(['Scope another project', 'Done — show full summary']);
      document.querySelectorAll('.project-btn').forEach(b => b.classList.remove('active'));
    });
  });
}

// ─── Input handler ─────────────────────────────────────────────────────────────
function handleUserInput() {
  const input = document.getElementById('userInput');
  const val = input.value.trim();
  if (!val) return;
  input.value = '';

  // If no project active
  if (!state.project || state.step >= (PROJECTS[state.project]?.steps.length || 0)) {
    clearQR();
    const lower = val.toLowerCase();
    if (lower.includes('another') || lower.includes('scope') || lower.includes('new')) {
      addMsg(val, 'user');
      botSay('Sure! Select a project from the left sidebar to get started.', 300);
    } else if (lower.includes('done') || lower.includes('summary') || lower.includes('full')) {
      addMsg(val, 'user');
      showFullSummary();
    } else {
      addMsg(val, 'user');
      botSay('Select a project from the left sidebar to begin scoping, or type <strong>summary</strong> to see the full breakdown.', 300);
    }
    return;
  }

  clearQR();
  processAnswer(val);
}

function showFullSummary() {
  const keys = Object.keys(state.sessionResults);
  if (keys.length === 0) {
    botSay('No projects have been scoped yet. Select a project from the sidebar to get started.');
    return;
  }
  let rows = keys.map(k => {
    const p = PROJECTS[k];
    const r = state.sessionResults[k];
    return `<div class="rc-row"><span>${p.icon} ${p.name}</span><span class="rc-val">${fmtHrs(r.hrs)} hrs — €${fmt(r.cost)}</span></div>`;
  }).join('');
  const totalHrs = round(keys.reduce((s,k) => s + state.sessionResults[k].hrs, 0));
  const totalCost = keys.reduce((s,k) => s + state.sessionResults[k].cost, 0);

  botSay(`
    📋 <strong>Full Pre-Sales Summary</strong>
    <div class="result-card">
      ${rows}
      <div class="rc-row big"><span>Grand Total</span><span class="rc-val">${fmtHrs(totalHrs)} hrs — €${fmt(totalCost)}</span></div>
    </div>
    <br><span style="color:var(--text-muted);font-size:11px">Rate: €${RATE}/hr · PM fee applied per project where selected</span>
  `, 500);
}

// ─── Enter key ────────────────────────────────────────────────────────────────
document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); handleUserInput(); }
});

// ─── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  await delay(300);
  await botSay(`👋 Welcome to the <strong>Lantech Pre-Sales Labour Calculator</strong>.<br><br>I can estimate labour hours and costs for the following project types:<br><br>
    <span class="tag">☁️ Cloud Migration</span>
    <span class="tag">🖥️ Server Upgrade</span>
    <span class="tag">🌐 Network Upgrade</span>
    <span class="tag">📧 SMTP Secure Send</span>
    <span class="tag">📱 MDM / MAM</span>
    <span class="tag">🖱️ AVD</span>
    <span class="tag">♻️ Recycling</span>
    <br><br>Select a project from the <strong>left sidebar</strong> to begin scoping.`, 200);
})();
</script>
